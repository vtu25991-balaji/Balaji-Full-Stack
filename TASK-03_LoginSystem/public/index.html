<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h2>Welcome Back</h2>
            <p>Please enter your credentials.</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g. admin" required>
                    <small id="userError" class="error-text">Username cannot be empty.</small>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="e.g. password123" required>
                    <small id="pwdError" class="error-text">Password must be at least 6 characters.</small>
                </div>
                
                <div id="apiError" class="api-error"></div>
                <div id="apiSuccess" class="api-success"></div>

                <button type="submit" id="loginBtn">Sign In</button>
            </form>
            
            <div style="margin-top:20px; font-size:12px; color: #888; text-align:center;">
                Use <strong>admin</strong> / <strong>password123</strong> to test.
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
